name: Release from Notes

run-name: "Release v${{ inputs.version }} from main"

# Security model: see docs/release-security.md
#
# The ONLY source for a release is the current commit of the protected 'main'
# branch at dispatch time (github.sha). No branch/ref/sha/repository inputs are
# accepted. Maven Central credentials and the GPG signing key live exclusively
# in the protected 'maven-central-upload' GitHub Environment and are only
# exposed to the 'build-and-publish-central' job, gated by a required
# reviewer -- that approval, not the shape of the code that runs afterward, is
# the actual credential boundary (Central tokens are not scoped per-operation,
# so a hand-rolled sign/upload script would not stop a stolen token any better
# than the plugin's own publish task does). npm publication uses OIDC trusted
# publishing (no stored token) behind the separate protected 'npm-publish'
# environment.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release, without a v prefix (e.g. 1.0.0 or 1.0.0-rc.1)"
        required: true
        type: string
      developmentVersion:
        description: "Next development version (e.g. 1.0.1-SNAPSHOT). Leave empty to auto-derive the next patch SNAPSHOT."
        required: false
        type: string
        default: ""
      # Flip the default to true once the npm package exists and OIDC trusted
      # publishing is configured (docs/release-security.md#npm-publication).
      publishNpm:
        description: "Publish @zenwave360/json-schema-ref-parser-kmp to npm (requires npm-publish environment approval)"
        required: false
        type: boolean
        default: false

# Default deny: every job gets read-only unless it explicitly declares more.
permissions:
  contents: read

# Only one release may run at a time, and a running release is never cancelled.
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  NPM_PACKAGE: "@zenwave360/json-schema-ref-parser-kmp"
  NPM_PACKAGE_URLENC: "@zenwave360%2Fjson-schema-ref-parser-kmp"
  CENTRAL_ARTIFACT: "json-schema-ref-parser-kmp"

jobs:
  # ---------------------------------------------------------------------------
  # validate: no secrets, read-only. Validates inputs, captures the trusted
  # main SHA (github.sha, immutable across reruns), validates release notes,
  # and checks the version is not already released anywhere (git tag, GitHub
  # release, Maven Central, npm when enabled).
  # ---------------------------------------------------------------------------
  validate:
    name: Validate version, notes and trusted commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      release_sha: ${{ steps.capture.outputs.release_sha }}
      version: ${{ steps.capture.outputs.version }}
      tag: ${{ steps.capture.outputs.tag }}
      notes_file: ${{ steps.capture.outputs.notes_file }}
      dev_version: ${{ steps.capture.outputs.dev_version }}
      publish_npm: ${{ steps.capture.outputs.publish_npm }}
    steps:
      - name: Require dispatch from the default branch (main)
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Release must be dispatched from 'main'. Got '${GITHUB_REF}'."
          exit 1

      # github.sha is the tip of main captured once at dispatch time; it does
      # not move if main receives new pushes, and it is stable across reruns.
      - name: Checkout trusted main commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate inputs, release notes and duplicate protection
        id: capture
        env:
          # Inputs are passed via env (never interpolated into script source)
          # and validated against a strict pattern before any other use.
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DEV_VERSION: ${{ inputs.developmentVersion }}
          INPUT_PUBLISH_NPM: ${{ inputs.publishNpm }}
          RELEASE_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # --- version policy: X.Y.Z or X.Y.Z-rc.N, no 'v' prefix ---
          if [[ ! "${INPUT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "::error::version must match X.Y.Z or X.Y.Z-rc.N (e.g. 1.0.0, 1.0.0-rc.1). Got '${INPUT_VERSION}'."
            exit 1
          fi
          VERSION="${INPUT_VERSION}"
          TAG="v${VERSION}"

          # --- next development version: X.Y.Z-SNAPSHOT, auto-derived if empty ---
          if [[ -z "${INPUT_DEV_VERSION}" ]]; then
            BASE="${VERSION%%-*}"
            MAJOR="${BASE%%.*}"; REST="${BASE#*.}"; MINOR="${REST%%.*}"; PATCH="${REST#*.}"
            if [[ "${VERSION}" == *-rc.* ]]; then
              DEV_VERSION="${BASE}-SNAPSHOT"
            else
              DEV_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
            fi
          else
            DEV_VERSION="${INPUT_DEV_VERSION}"
          fi
          if [[ ! "${DEV_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-SNAPSHOT$ ]]; then
            echo "::error::developmentVersion must match X.Y.Z-SNAPSHOT. Got '${DEV_VERSION}'."
            exit 1
          fi

          if [[ "${INPUT_PUBLISH_NPM}" != "true" && "${INPUT_PUBLISH_NPM}" != "false" ]]; then
            echo "::error::publishNpm must be true or false."
            exit 1
          fi

          # --- trusted commit must be reachable from origin/main ---
          if ! git merge-base --is-ancestor "${RELEASE_SHA}" origin/main; then
            echo "::error::Captured commit ${RELEASE_SHA} is not reachable from origin/main."
            exit 1
          fi

          # --- release notes: deterministic path derived from the validated version ---
          NOTES_FILE="release-notes/release-notes.v${VERSION}.md"
          if [[ -L "${NOTES_FILE}" ]]; then
            echo "::error::Release notes ${NOTES_FILE} must not be a symlink."
            exit 1
          fi
          if [[ ! -f "${NOTES_FILE}" || ! -s "${NOTES_FILE}" ]]; then
            echo "::error::Missing or empty release notes: ${NOTES_FILE}. Commit them to main before releasing."
            exit 1
          fi
          if ! grep -qF "${VERSION}" "${NOTES_FILE}"; then
            echo "::error::${NOTES_FILE} never mentions '${VERSION}'. Are these the notes for this release?"
            exit 1
          fi

          # --- duplicate release protection ---
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists locally."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists on origin."
            exit 1
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::error::GitHub release ${TAG} already exists."
            exit 1
          fi
          HTTP_CODE="$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://repo1.maven.org/maven2/io/zenwave360/jsonrefparser/${CENTRAL_ARTIFACT}/${VERSION}/")"
          if [[ "${HTTP_CODE}" != "404" ]]; then
            echo "::error::Version ${VERSION} appears already published on Maven Central (HTTP ${HTTP_CODE})."
            exit 1
          fi

          # --- npm pre-flight (only when npm publication is requested) ---
          if [[ "${INPUT_PUBLISH_NPM}" == "true" ]]; then
            NPM_META_FILE="$(mktemp)"
            NPM_CODE="$(curl -sS -o "${NPM_META_FILE}" -w '%{http_code}' \
              "https://registry.npmjs.org/${NPM_PACKAGE_URLENC}")"
            if [[ "${NPM_CODE}" != "200" ]]; then
              echo "::error::${NPM_PACKAGE} does not exist on registry.npmjs.org (HTTP ${NPM_CODE})."
              echo "::error::OIDC trusted publishing requires an existing package: the FIRST publish is manual. See docs/release-security.md#first-npm-publish"
              exit 1
            fi
            if ! jq --arg v "${VERSION}" -e '.versions[$v] | not' "${NPM_META_FILE}" >/dev/null; then
              echo "::error::${NPM_PACKAGE}@${VERSION} is already published on npm."
              exit 1
            fi
            rm -f "${NPM_META_FILE}"
          fi

          {
            echo "release_sha=${RELEASE_SHA}"
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "notes_file=${NOTES_FILE}"
            echo "dev_version=${DEV_VERSION}"
            echo "publish_npm=${INPUT_PUBLISH_NPM}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Release v${VERSION}"
            echo "- Trusted main commit: \`${RELEASE_SHA}\`"
            echo "- Tag: \`${TAG}\`"
            echo "- Release notes: \`${NOTES_FILE}\`"
            echo "- Next development version: \`${DEV_VERSION}\`"
            echo "- npm publication: \`${INPUT_PUBLISH_NPM}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # prepare-release: the ONLY job with contents:write/pull-requests:write before
  # publication. Bumps the version in build.gradle.kts with sed (NO Gradle
  # execution, so no repository-controlled code runs in this job at all),
  # creates the release commit + next development commit on a throwaway
  # release/<version> branch, and lands them on main via a PR (auto-merged,
  # not pushed directly).
  #
  # Why a PR instead of a direct push: main's ruleset requires changes to go
  # through a pull request. A direct push would need a bypass actor added to
  # that ruleset -- but ruleset bypass is granted to an IDENTITY (e.g. "GitHub
  # Actions"), not to this one job. Any other workflow in the repo capable of
  # authenticating as that identity would inherit the same bypass, which is a
  # far bigger hole than this job's own blast radius. Merging a PR needs no
  # bypass at all: it is the standard, already-allowed path, so this design
  # adds no new privileged identity to the repository.
  #
  # Receives NO Central/npm/signing secrets; the GITHUB_TOKEN exists only in
  # the push/PR steps. A genuine conflict (something else changed
  # build.gradle.kts concurrently) fails the merge instead of silently
  # resolving it.
  # ---------------------------------------------------------------------------
  prepare-release:
    name: Create release commit and tag
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    permissions:
      contents: write # push the release branch and the tag
      pull-requests: write # open and auto-merge the release PR
    outputs:
      release_commit_sha: ${{ steps.commit.outputs.release_commit_sha }}
    steps:
      - name: Checkout trusted main commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.validate.outputs.release_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Refuse a stale release branch
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "release/${VERSION}" >/dev/null 2>&1; then
            echo "::error::Branch release/${VERSION} already exists on origin (leftover from a previous run?). Delete it and re-run."
            exit 1
          fi

      - name: Set release version and create release commit and tag
        id: commit
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          set_version() { # set_version <new-version>
            if [[ "$(grep -c '^version = ' build.gradle.kts)" != "1" ]]; then
              echo "::error::Expected exactly one top-level 'version = ' line in build.gradle.kts."
              exit 1
            fi
            sed -i -E "s/^version = \".*\"$/version = \"$1\"/" build.gradle.kts
            if ! grep -qxF "version = \"$1\"" build.gradle.kts; then
              echo "::error::Failed to set version $1 in build.gradle.kts."
              exit 1
            fi
            # Only build.gradle.kts may change; anything else aborts the release.
            UNEXPECTED="$(git diff --name-only | grep -vxF 'build.gradle.kts' || true)"
            if [[ -n "${UNEXPECTED}" ]]; then
              echo "::error::Unexpected files modified by version update:"
              echo "${UNEXPECTED}"
              exit 1
            fi
            git --no-pager diff
          }

          set_version "${VERSION}"
          git commit -am "chore(release): release ${VERSION}"
          # Tag object is created locally now (pointing at this exact commit)
          # but only pushed once the PR below has actually merged into main.
          git tag -a "${TAG}" -m "Release ${VERSION}"
          echo "release_commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Set next development version
        env:
          DEV_VERSION: ${{ needs.validate.outputs.dev_version }}
        run: |
          set -euo pipefail
          sed -i -E "s/^version = \".*\"$/version = \"${DEV_VERSION}\"/" build.gradle.kts
          if ! grep -qxF "version = \"${DEV_VERSION}\"" build.gradle.kts; then
            echo "::error::Failed to set next development version in build.gradle.kts."
            exit 1
          fi
          git --no-pager diff
          git commit -am "chore(release): prepare next development version ${DEV_VERSION}"

      # The token is only present in this step's env, never persisted to disk
      # or exposed to any build tool.
      - name: Push release branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          ASKPASS="$(mktemp)"
          trap 'rm -f "${ASKPASS}"' EXIT
          printf '#!/bin/sh\nprintf %%s "${GITHUB_TOKEN}"\n' > "${ASKPASS}"
          chmod 700 "${ASKPASS}"

          GIT_ASKPASS="${ASKPASS}" git push \
            "https://x-access-token@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:refs/heads/release/${VERSION}"

      - name: Open and merge release PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.validate.outputs.version }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          PR_URL="$(gh pr create --base main --head "release/${VERSION}" \
            --title "chore(release): ${VERSION}" \
            --body "Automated release commit and next-development version bump for ${TAG}. This PR is required because main is protected; once merged, the release continues automatically.")"
          PR_NUMBER="${PR_URL##*/}"
          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          # Merge immediately rather than requesting GitHub's native auto-merge
          # (which requires the repo-level "Allow auto-merge" setting and
          # would otherwise just fail with a GraphQL error). This works because
          # required approvals is 0 and main has no required status checks that
          # only run on pull_request events, so the PR is already mergeable.
          gh pr merge "${PR_NUMBER}" --merge --delete-branch

      # Safety net: the merge above is normally synchronous, but this confirms
      # it actually landed (e.g. if a merge queue or delayed check deferred
      # it) and fails fast on a real conflict or on the PR being closed
      # unmerged, instead of spinning for the full timeout.
      - name: Wait for release PR to merge
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          ELAPSED=0
          TIMEOUT=900
          while true; do
            STATE="$(gh pr view "${PR_NUMBER}" --json state --jq '.state')"
            if [[ "${STATE}" == "MERGED" ]]; then
              break
            fi
            if [[ "${STATE}" == "CLOSED" ]]; then
              echo "::error::Release PR #${PR_NUMBER} was closed without merging."
              exit 1
            fi
            MERGEABLE="$(gh pr view "${PR_NUMBER}" --json mergeable --jq '.mergeable')"
            if [[ "${MERGEABLE}" == "CONFLICTING" ]]; then
              echo "::error::Release PR #${PR_NUMBER} conflicts with main (something else changed build.gradle.kts concurrently). Resolve manually and re-run the release."
              exit 1
            fi
            if (( ELAPSED >= TIMEOUT )); then
              echo "::error::Timed out waiting for release PR #${PR_NUMBER} to merge (state=${STATE}). Check required status checks / branch protection."
              exit 1
            fi
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

      # Only pushed after the commit above is confirmed to be reachable from
      # main via the merge, so the tag can never point at unmerged content.
      - name: Push release tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          ASKPASS="$(mktemp)"
          trap 'rm -f "${ASKPASS}"' EXIT
          printf '#!/bin/sh\nprintf %%s "${GITHUB_TOKEN}"\n' > "${ASKPASS}"
          chmod 700 "${ASKPASS}"

          GIT_ASKPASS="${ASKPASS}" git push \
            "https://x-access-token@github.com/${GITHUB_REPOSITORY}.git" \
            "refs/tags/${TAG}"

  # ---------------------------------------------------------------------------
  # build-and-publish-central: builds and uploads the Maven Central deployment
  # using the plugin's own publishToMavenCentral task (never
  # publishAndReleaseToMavenCentral, which would auto-release). Gated by the
  # protected 'maven-central-upload' environment (required reviewer +
  # deployments restricted to main) -- that approval before this job even
  # starts is the actual credential boundary. Central tokens are not scoped
  # per-operation, so a hand-rolled sign/zip/curl script would not stop a
  # stolen token any better than this does; it just added complexity for no
  # real security gain.
  # ---------------------------------------------------------------------------
  build-and-publish-central:
    name: Build and publish Maven Central deployment (autoPublish=false)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [validate, prepare-release]
    environment: maven-central-upload
    permissions:
      contents: read
    steps:
      - name: Checkout immutable release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare-release.outputs.release_commit_sha }}
          persist-credentials: false

      # The committed gradle-wrapper.jar is executable code: verify its
      # checksum against Gradle's published checksums before running it.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "18"

      - name: Build and publish to Maven Central (requires manual Publish in the Portal)
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew build publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGN_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGN_KEY_PASS }}

  # ---------------------------------------------------------------------------
  # create-github-release: runs AFTER the Central upload succeeded, so a GitHub
  # release is never announced for artifacts that failed to reach the Portal.
  # Deliberately does NOT wait for npm publication (which may be disabled or
  # approved later). Uses the committed notes from the immutable release commit.
  # ---------------------------------------------------------------------------
  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, prepare-release, build-and-publish-central]
    permissions:
      contents: write # create the GitHub release for the existing tag
    steps:
      - name: Checkout immutable release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare-release.outputs.release_commit_sha }}
          persist-credentials: false

      - name: Create GitHub release from committed notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          NOTES_FILE: ${{ needs.validate.outputs.notes_file }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" --verify-tag \
            --title "${TAG}" \
            --notes-file "${NOTES_FILE}"

  # ---------------------------------------------------------------------------
  # publish-npm: the privileged npm job. Skipped entirely unless the
  # publishNpm input is true. Gated by the protected 'npm-publish' environment:
  # its OWN required reviewer, separate from Maven Central approval. No Maven
  # Central credentials are available here, and no npm credentials exist at
  # all: publication uses OIDC trusted publishing (id-token: write), which npm
  # validates against this repository + workflow + environment. Builds the
  # package itself from the immutable release commit (self-contained, no
  # cross-job artifact) and publishes with --ignore-scripts.
  # ---------------------------------------------------------------------------
  publish-npm:
    name: Publish npm package (OIDC trusted publishing)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate, prepare-release, build-and-publish-central]
    if: needs.validate.outputs.publish_npm == 'true'
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # OIDC token for npm trusted publishing (no stored secret)
    steps:
      - name: Checkout immutable release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare-release.outputs.release_commit_sha }}
          persist-credentials: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      # npm >= 11.5.1 is required for OIDC trusted publishing; Node 24 bundles it.
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Build and pack npm package
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew build

          PKG_DIR="build/js/packages/json-schema-ref-parser-kmp"
          if [[ ! -f "${PKG_DIR}/package.json" ]]; then
            echo "::error::Generated npm package not found at ${PKG_DIR}."
            exit 1
          fi
          NAME="$(jq -er '.name' "${PKG_DIR}/package.json")"
          PKG_VERSION="$(jq -er '.version' "${PKG_DIR}/package.json")"
          if [[ "${NAME}" != "${NPM_PACKAGE}" ]]; then
            echo "::error::package.json name '${NAME}' != expected '${NPM_PACKAGE}'."
            exit 1
          fi
          if [[ "${PKG_VERSION}" != "${VERSION}" ]]; then
            echo "::error::package.json version '${PKG_VERSION}' != release version '${VERSION}'."
            exit 1
          fi

          mkdir -p "${RUNNER_TEMP}/npm"
          npm pack --ignore-scripts --pack-destination "${RUNNER_TEMP}/npm" "./${PKG_DIR}"
          TARBALL="$(basename "$(find "${RUNNER_TEMP}/npm" -type f -name '*.tgz')")"

          # Tarball entries must all live under package/ (no traversal), and
          # the embedded package.json must match with no lifecycle scripts.
          if tar -tzf "${RUNNER_TEMP}/npm/${TARBALL}" | grep -Ev '^package/'; then
            echo "::error::Tarball contains entries outside package/."
            exit 1
          fi
          if ! tar -xzOf "${RUNNER_TEMP}/npm/${TARBALL}" package/package.json \
              | jq -e '(.scripts // {}) | length == 0' >/dev/null; then
            echo "::error::Tarball package.json declares lifecycle scripts; refusing to publish."
            exit 1
          fi

          echo "TARBALL=${TARBALL}" >> "${GITHUB_ENV}"

      - name: Publish to npm via OIDC trusted publishing
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          NPM_VERSION="$(npm --version)"
          if [[ "$(printf '%s\n' 11.5.1 "${NPM_VERSION}")" != "$(printf '%s\n' 11.5.1 "${NPM_VERSION}" | sort -V)" ]]; then
            echo "::error::npm ${NPM_VERSION} < 11.5.1; OIDC trusted publishing unsupported."
            exit 1
          fi

          # Duplicate guard immediately before publishing.
          META="$(curl -sS "https://registry.npmjs.org/${NPM_PACKAGE_URLENC}")"
          if ! jq -e 'has("versions")' <<< "${META}" >/dev/null; then
            echo "::error::${NPM_PACKAGE} not found on the registry; the first publish is manual (docs/release-security.md#first-npm-publish)."
            exit 1
          fi
          if ! jq --arg v "${VERSION}" -e '.versions[$v] | not' <<< "${META}" >/dev/null; then
            echo "::error::${NPM_PACKAGE}@${VERSION} is already published."
            exit 1
          fi

          # No token anywhere: npm exchanges the GitHub OIDC token for a
          # short-lived publish credential and attaches provenance
          # automatically. --ignore-scripts is defense in depth on top of the
          # scripts check above.
          npm publish "${RUNNER_TEMP}/npm/${TARBALL}" --ignore-scripts --access public

          {
            echo "### npm package published"
            echo "- \`${NPM_PACKAGE}@${VERSION}\` via OIDC trusted publishing (with provenance)"
            echo "- https://www.npmjs.com/package/${NPM_PACKAGE}/v/${VERSION}"
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # sync-develop: post-release housekeeping. Merges the release version bumps
  # from main back into develop and re-triggers snapshot publication. Receives
  # no publication or signing secrets; runs entirely through the GitHub API.
  # ---------------------------------------------------------------------------
  sync-develop:
    name: Sync main back to develop
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate, create-github-release]
    permissions:
      contents: write # merge the sync PR
      pull-requests: write # create the sync PR
      actions: write # dispatch publish-maven-snapshots.yml on develop
    steps:
      - name: Create and merge sync PR, then trigger snapshot publication
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail

          AHEAD="$(gh api "repos/${GH_REPO}/compare/develop...main" --jq '.ahead_by')"
          if [[ "${AHEAD}" == "0" ]]; then
            echo "develop already contains main; nothing to sync."
          else
            PR_NUMBER="$(gh pr list --base develop --head main --state open --json number --jq '.[0].number // empty')"
            if [[ -z "${PR_NUMBER}" ]]; then
              PR_URL="$(gh pr create --base develop --head main \
                --title "Sync main back to develop after ${TAG}" \
                --body "Syncs the ${TAG} release commit and next snapshot version back to develop.")"
              PR_NUMBER="${PR_URL##*/}"
            fi
            gh pr merge "${PR_NUMBER}" --merge
          fi

          # Pushes made with GITHUB_TOKEN do not trigger workflows, so snapshot
          # publication for the new development version is dispatched explicitly.
          gh workflow run publish-maven-snapshots.yml --ref develop
