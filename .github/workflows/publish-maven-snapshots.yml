name: Build and Publish Snapshots

on:
  push:
    branches: [ develop, next ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test with coverage
        run: ./gradlew build koverHtmlReport koverXmlReport koverLog

      - name: Extract coverage metrics
        if: always()
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("build/reports/kover/report.xml")
          root = ET.parse(report).getroot()

          metrics = {}
          for counter in root.findall("counter"):
              counter_type = counter.attrib["type"]
              missed = int(counter.attrib["missed"])
              covered = int(counter.attrib["covered"])
              total = covered + missed
              percent = 100.0 * covered / total if total else 0.0
              metrics[counter_type] = round(percent)

          github_env = Path(os.environ["GITHUB_ENV"])
          with github_env.open("a", encoding="utf-8") as env:
              env.write(f"LINE_COVERAGE={metrics.get('LINE', 0)}\n")
              env.write(f"BRANCH_COVERAGE={metrics.get('BRANCH', 0)}\n")
          PY

      - name: Print coverage to console
        if: always()
        run: |
          echo "line coverage = ${LINE_COVERAGE}%"
          echo "branch coverage = ${BRANCH_COVERAGE}%"

      - name: Publish coverage summary
        if: always()
        run: |
          {
            echo "## Kover Test Coverage Summary"
            echo
            echo "- Coverage: ${LINE_COVERAGE}%"
            echo "- Branches: ${BRANCH_COVERAGE}%"
            echo "- Generated by: Kover XML report"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            build/reports/kover/
            build/reports/tests/

      - name: Publish snapshots to Maven Central
        run: ./gradlew publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGN_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGN_KEY_PASS }}
